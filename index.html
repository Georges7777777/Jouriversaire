<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="description" content="Jouriversaire — célébrez vos milliers de jours." />
<title>Jouriversaire</title>
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--serif:'Baloo 2','Trebuchet MS',sans-serif;--mono:'Nunito','Avenir Next',Verdana,sans-serif;
    --coral:#e8654f;--tealc:#1c5d5a;--goldc:#e9b949;--creamc:#f6ecca;--mintc:#a9d6ce;--pinkc:#f6c9c0;
    --bg:#f5efe3;--card:#fffdf8;--line:#e7ddca;--ink:#2d2820;--muted:#938974;
    --gold:#b8893a;--accent:#d4582f;--soft:#fbf6ec;
    --grad:linear-gradient(135deg,#FBB040,#F2674A,#F0506E);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);line-height:1.5;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  html[dir=rtl] body{text-align:right;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 70px;}
  a{color:var(--accent);}

  header{display:flex;align-items:center;gap:13px;padding:8px 0 4px;flex-wrap:wrap;}
  .logo{width:46px;height:46px;border-radius:13px;box-shadow:0 6px 18px rgba(242,103,74,.22);display:block;flex:0 0 46px;}
  .brandtxt{flex:1;}
  .brandtxt h1{font-family:var(--serif);font-size:23px;font-weight:700;color:var(--ink);line-height:1;}
  .brandtxt h1 em{font-style:normal;color:var(--accent);}
  .langsel{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--ink);color-scheme:light;outline:none;cursor:pointer;}
  .nav{font-size:12px;color:#0f8b85;font-weight:800;letter-spacing:.04em;cursor:pointer;}
  .nav:hover{color:var(--accent);}

  .hero{margin:26px 0 8px;}
  .hero h2{font-family:var(--serif);font-size:clamp(27px,6.4vw,42px);font-weight:800;color:var(--ink);line-height:1.15;margin-bottom:18px;}
  .hero h2 em{font-style:normal;color:var(--accent);}
  .lede{font-size:14px;color:#5e564a;line-height:1.75;margin-bottom:14px;}
  .lede b{color:var(--ink);font-weight:800;}
  .copyline{font-size:11px;color:#9a8f78;letter-spacing:.03em;margin-top:16px;border-inline-start:2px solid var(--line);padding-inline-start:12px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;margin:18px 0;position:relative;overflow:hidden;box-shadow:0 2px 16px rgba(80,55,20,.05);}
  .card.accent::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);}
  .label{font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}

  label.fld{display:block;font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin:0 0 8px;}
  input.in,select.in{width:100%;background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:13px 15px;
    font-family:var(--mono);font-size:16px;color:var(--ink);outline:none;transition:border-color .2s;color-scheme:light;-webkit-appearance:none;appearance:none;}
  input.in:focus,select.in:focus{border-color:var(--accent);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:none;border-radius:11px;
    padding:13px 16px;font-family:var(--mono);font-size:13px;letter-spacing:.04em;transition:transform .12s,filter .2s;width:100%;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--grad);color:#fff;font-weight:500;}
  .btn-ghost{background:var(--soft);border:1px solid var(--line);color:#6a6253;}
  .btn-danger{background:#fbeeea;border:1px solid #eccabd;color:#b5482c;}
  .btn-row{display:flex;gap:10px;}

  .results{display:none;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .stat{border:none;border-radius:16px;padding:15px 17px;position:relative;overflow:hidden;box-shadow:0 3px 12px rgba(80,55,20,.10);}
  .stat-l{font-size:10px;letter-spacing:.13em;text-transform:uppercase;font-weight:700;opacity:.85;margin-bottom:5px;}
  .stat-v{font-family:var(--serif);font-size:27px;font-weight:800;line-height:1;letter-spacing:-.5px;}
  .stat .ic{position:absolute;top:11px;inset-inline-end:13px;font-size:19px;opacity:.92;}
  .stat.lead{grid-column:1/-1;}.stat.lead .stat-v{font-size:44px;}
  .c-coral{background:var(--coral);color:#fff;}.c-teal{background:var(--tealc);color:#fff;}
  .c-gold{background:var(--goldc);color:#4a3a10;}.c-cream{background:var(--creamc);color:#5a4a20;}
  .c-mint{background:var(--mintc);color:#1c4a45;}.c-pink{background:var(--pinkc);color:#7a3a30;}
  .age-line{font-family:var(--serif);font-size:15px;color:#5e564a;margin:4px 0 14px;}.age-line b{color:var(--accent);}

  /* --- Encadré des prochains jouriversaires --- */
  .upbox{border:2px solid #e0b168;background:linear-gradient(135deg,#fdf5e6,#fceede);border-radius:14px;padding:18px 20px;margin-top:16px;box-shadow:0 2px 14px rgba(200,140,50,.10);}
  .up-title{font-size:10px;letter-spacing:.22em;color:#a06a20;text-transform:uppercase;margin-bottom:6px;font-weight:500;}
  .uprow{display:flex;align-items:baseline;gap:12px;padding:12px 0;border-bottom:1px dashed #ecd9b8;flex-wrap:wrap;}
  .uprow:last-child{border-bottom:none;padding-bottom:2px;}
  .uprow .n{font-size:13px;color:#7a6a48;min-width:120px;}
  .uprow .d{font-family:var(--serif);font-size:23px;font-weight:700;color:var(--accent);}
  .uprow .r{font-size:11px;color:#9a8f78;margin-inline-start:auto;}

  /* --- Blocs enrichis (mesures, carte d'identité, surprise, blague) --- */
  .xcard{background:#fffdf8;border:1px solid #ece0c8;border-radius:16px;padding:17px 18px;margin-top:14px;box-shadow:0 3px 14px rgba(80,55,20,.06);}
  .xh{font-family:var(--serif);font-size:17px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px;margin-bottom:2px;}
  .xsub{font-size:12px;color:#8a7f6a;margin-bottom:10px;}
  .measure{display:flex;align-items:center;gap:13px;padding:10px 0;border-bottom:1px solid #f1e8d6;}
  .measure:last-child{border-bottom:none;padding-bottom:2px;}
  .measure .e{font-size:21px;width:30px;text-align:center;flex:0 0 30px;}
  .mbig{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--accent);}
  .mtxt{font-size:13px;color:#5e564a;}
  .idcard{border:2px solid var(--goldc);background:linear-gradient(135deg,#fdf6e4,#fcefd8);}
  .idgrid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:8px;}
  .idcell{background:#fffdf8;border:1px solid #ecdcb8;border-radius:12px;padding:11px 13px;}
  .idcell .k{font-size:10px;letter-spacing:.09em;text-transform:uppercase;color:#a08a50;margin-bottom:4px;font-weight:700;}
  .idcell .val{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--ink);}
  .surprise{background:linear-gradient(135deg,var(--tealc),#164a47);color:#fff;border:none;}
  .surprise .xh{color:#fff;}
  .spbig{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--goldc);margin:6px 0;}
  .surprise p{font-size:13.5px;color:#e6f0ee;line-height:1.65;}
  .jokecard{background:linear-gradient(135deg,#fdeede,#fce6dd);border:1px solid #f2d3c4;}
  .jk-q{font-family:var(--serif);font-size:14.5px;font-weight:600;color:#5a5142;line-height:1.6;margin-top:6px;}
  .refresh{font-size:11px;color:var(--accent);font-weight:700;cursor:pointer;margin-inline-start:auto;font-family:var(--mono);}
  /* --- Décorations statiques (toutes les vues) --- */
  .wrap{position:relative;}
  header{position:relative;z-index:5;}
  .deco{pointer-events:none;user-select:none;-webkit-user-select:none;}
  .deco-cal{position:absolute;top:-12px;inset-inline-end:-42px;width:min(58vw,470px);z-index:-1;opacity:.95;}
  .deco-confetti{position:fixed;inset-inline-start:-26px;top:36vh;width:min(15vw,105px);z-index:3;opacity:.95;}
  .deco-charts{position:fixed;bottom:-18px;inset-inline-end:-14px;width:min(32vw,240px);z-index:3;}
  @media(max-width:560px){
    .deco-confetti{display:none;}
    .deco-cal{width:58vw;top:-8px;inset-inline-end:-30px;}
    .deco-charts{width:30vw;}
  }

  .item{display:flex;align-items:center;gap:13px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:border-color .2s;}
  .item:hover{border-color:#e0b48f;}
  .ava{width:40px;height:40px;border-radius:50%;flex:0 0 40px;display:flex;align-items:center;justify-content:center;font-size:19px;background:#fff;border:1px solid var(--line);}
  .it-name{font-family:var(--serif);font-size:17px;font-weight:600;color:var(--ink);}
  .it-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  .it-days{margin-inline-start:auto;text-align:end;}
  .it-days b{font-family:var(--serif);font-size:20px;color:var(--gold);}
  .it-days span{display:block;font-size:8px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;}
  .del-x{margin-inline-start:4px;color:#bcae93;padding:4px 6px;}.del-x:hover{color:var(--accent);}

  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:9px;font-size:12px;letter-spacing:.05em;cursor:pointer;background:var(--soft);border:1px solid var(--line);color:var(--muted);}
  .tab.active{background:#fdeede;border-color:#eccbb3;color:var(--accent);}
  .msg{font-size:12px;line-height:1.6;margin-top:12px;padding:11px 13px;border-radius:9px;display:none;}
  .msg.show{display:block;}
  .msg.ok{background:#eef7ee;border:1px solid #cfe6cf;color:#3f7a45;}
  .msg.err{background:#fbeeea;border:1px solid #eccabd;color:#b5482c;}
  .msg.info{background:#f8f2e6;border:1px solid #ecdcbf;color:#7a6a48;}

  .danger-zone{border-top:1px solid var(--line);margin-top:26px;padding-top:20px;}
  .who{font-size:11px;color:var(--muted);}.who b{color:var(--accent);}
  .legal{font-size:11px;color:#6e6556;line-height:1.7;}
  .legal h4{font-family:var(--serif);font-size:14px;color:var(--ink);margin:14px 0 6px;font-style:italic;}
  .foot{font-size:10px;color:#a99e86;letter-spacing:.05em;text-align:center;margin-top:30px;line-height:2;}
  .foot a{color:#0f8b85;font-weight:700;text-decoration:none;}
  .hidden{display:none!important;}
  input[type=file]{display:none;}
  .pill{display:inline-block;font-size:9px;letter-spacing:.06em;color:#fff;background:var(--grad);padding:2px 8px;border-radius:20px;text-transform:uppercase;vertical-align:middle;margin-inline-start:6px;}
</style>
</head>
<body>
<div class="wrap">

  <img class="deco deco-cal" src="deco-calendars.png" alt="" aria-hidden="true" />
  <img class="deco deco-confetti" src="deco-confetti.png" alt="" aria-hidden="true" />
  <img class="deco deco-charts" src="deco-charts.png" alt="" aria-hidden="true" />

  <header>
    <span id="logo-slot"></span>
    <div class="brandtxt"><h1><em>Jouri</em>versaire</h1></div>
    <select class="langsel" id="lang-sel" aria-label="Langue"></select>
    <span class="nav" id="nav-account">Mon compte ›</span>
  </header>

  <section id="view-home">
    <div style="margin:2px 0 0"><span class="nav" id="list-back" style="display:none"></span></div>
    <div class="hero">
      <h2 id="hero-title"></h2>
      <p class="lede" id="lede1"></p>
      <p class="lede" id="lede2"></p>
      <p class="copyline" id="copyline"></p>
    </div>

    <div class="card accent">
      <div class="label" id="lbl-calc"></div>
      <div class="row2">
        <div><label class="fld" id="lbl-date" for="c-date"></label><input class="in" id="c-date" type="date" /></div>
        <div><label class="fld" id="lbl-time" for="c-time"></label><input class="in" id="c-time" type="time" /></div>
      </div>
      <div class="results" id="results">
        <div class="age-line" id="r-age"></div>
        <div class="grid" id="r-grid"></div>
        <div class="upbox">
          <div class="up-title" id="lbl-up"></div>
          <div id="r-up"></div>
        </div>
        <div class="xcard" id="x-measures">
          <div class="xh">🌍 <span id="ex-title"></span></div>
          <div class="xsub" id="ex-sub"></div>
          <div id="ex-rows"></div>
        </div>
        <div class="xcard idcard">
          <div class="xh">🗓️ <span id="id-title"></span></div>
          <div class="xsub" id="id-sub"></div>
          <div class="idgrid" id="id-grid"></div>
        </div>
        <div class="xcard surprise">
          <div class="xh">✨ <span id="sp-title"></span></div>
          <div class="spbig" id="sp-big"></div>
          <p id="sp-txt"></p>
        </div>
        <div class="xcard jokecard">
          <div class="xh">😄 <span id="jk-title"></span> <span class="refresh" id="jk-refresh"></span></div>
          <p class="jk-q" id="jk-txt"></p>
        </div>
      </div>
    </div>

    <div class="card" id="cta-card">
      <div class="label" id="lbl-keep"></div>
      <p class="lede" id="txt-keep" style="margin-bottom:14px;font-size:13px"></p>
      <button class="btn btn-primary" id="cta-account"></button>
    </div>
  </section>

  <section id="view-account" class="hidden">
    <span class="nav" id="back-home"></span>
    <div id="auth-block" class="card accent" style="margin-top:14px">
      <div class="tabs">
        <div class="tab active" id="tab-login"></div>
        <div class="tab" id="tab-signup"></div>
      </div>
      <label class="fld" id="lbl-email" for="a-email"></label>
      <input class="in" id="a-email" type="email" autocomplete="email" style="margin-bottom:14px" placeholder="you@mail.com" />
      <label class="fld" id="lbl-pass" for="a-pass"></label>
      <input class="in" id="a-pass" type="password" autocomplete="current-password" style="margin-bottom:16px" placeholder="••••••••" />
      <button class="btn btn-primary" id="a-submit"></button>
      <div style="text-align:center;margin-top:12px"><span class="nav" id="a-forgot" style="font-size:11px"></span></div>
      <div class="msg" id="a-msg"></div>
      <div class="legal" id="consent" style="margin-top:14px;display:none"></div>
    </div>

    <div id="app-block" class="hidden">
      <div class="card" style="margin-top:14px">
        <div class="who"><span id="who-label"></span> <b id="who-email"></b> <span class="nav" id="a-logout" style="float:right"></span></div>
      </div>
      <div class="card accent">
        <div class="label" id="lbl-add"></div>
        <label class="fld" id="lbl-dlabel" for="d-name"></label>
        <input class="in" id="d-name" style="margin-bottom:12px" />
        <label class="fld" id="lbl-dtype" for="d-type"></label>
        <select class="in" id="d-type" style="margin-bottom:12px">
          <option value="naissance" id="opt-naissance"></option><option value="mariage" id="opt-mariage"></option>
          <option value="rencontre" id="opt-rencontre"></option><option value="autre" id="opt-autre"></option>
        </select>
        <div class="row2" style="margin-bottom:14px">
          <div><label class="fld" id="lbl-ddate" for="d-date"></label><input class="in" id="d-date" type="date" /></div>
          <div><label class="fld" id="lbl-dtime" for="d-time"></label><input class="in" id="d-time" type="time" /></div>
        </div>
        <button class="btn btn-primary" id="d-add"></button>
        <div class="msg" id="d-msg"></div>
      </div>
      <div class="card">
        <div class="label"><span id="lbl-mydates"></span><select class="langsel" id="d-sort" style="padding:6px 9px;font-size:11px"></select></div>
        <div id="d-list"></div>
        <div id="d-empty" class="legal" style="text-align:center;padding:16px 0;font-style:italic"></div>
      </div>
      <div class="card">
        <div class="label"><span id="lbl-mydata"></span> <span class="pill">RGPD</span></div>
        <p class="legal" id="rgpd-desc" style="margin-bottom:14px"></p>
        <div class="btn-row">
          <button class="btn btn-ghost" id="rgpd-export"></button>
          <button class="btn btn-ghost" id="rgpd-import"></button>
        </div>
        <input type="file" id="rgpd-file" accept=".csv,text/csv" />
        <div class="msg" id="rgpd-msg"></div>
        <div class="danger-zone">
          <button class="btn btn-danger" id="rgpd-delete" style="width:auto"></button>
        </div>
      </div>
    </div>
  </section>

  <section id="view-legal" class="hidden">
    <span class="nav" id="back-home2"></span>
    <div class="card" style="margin-top:14px"><div class="legal" id="legal-body"></div></div>
  </section>

  <div class="foot">
    <span id="foot-tag"></span><br>
    <a href="mailto:contact@jouriversaire.com">✉ contact@jouriversaire.com</a><br>
    © 2026 Georges Viana · <span class="nav" id="foot-legal"></span>
  </div>
</div>

function seasonIdx(d){var m=d.getMonth()+1,dd=d.getDate();
  if((m===3&&dd>=20)||m===4||m===5||(m===6&&dd<21))return 0;
  if((m===6&&dd>=21)||m===7||m===8||(m===9&&dd<22))return 1;
  if((m===9&&dd>=22)||m===10||m===11||(m===12&&dd<21))return 2;
  return 3;}
function zodiacIdx(d){var m=d.getMonth()+1,dd=d.getDate();
  /* index 0=Bélier … 11=Poissons */
  if(m===1)return dd<20?9:10; if(m===2)return dd<19?10:11; if(m===3)return dd<21?11:0;
  if(m===4)return dd<20?0:1; if(m===5)return dd<21?1:2; if(m===6)return dd<21?2:3;
  if(m===7)return dd<23?3:4; if(m===8)return dd<23?4:5; if(m===9)return dd<23?5:6;
  if(m===10)return dd<23?6:7; if(m===11)return dd<22?7:8; return dd<22?8:9;}
function cnzIdx(d){var y=d.getFullYear(),m=d.getMonth()+1,dd=d.getDate();
  if(m<2||(m===2&&dd<4))y--; /* approximation du nouvel an chinois (~4 février) */
  return ((y-4)%12+12)%12;}
function moonIdx(d){var syn=29.53058867,ref=Date.UTC(2000,0,6,18,14);
  var days=(d.getTime()-ref)/86400000,ph=((days%syn)+syn)%syn;
  return Math.floor(ph/syn*8+0.5)%8;}
function dayOfYear(d){var y=d.getFullYear();return Math.round((Date.UTC(y,d.getMonth(),d.getDate())-Date.UTC(y,0,0))/86400000);}
function isLeap(y){return (y%4===0&&y%100!==0)||y%400===0;}

  const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='jouriversaire.csv';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),500);

function splitCsv(line,sep){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){const ch=line[i];
    if(q){if(ch==='"'){if(line[i+1]==='"'){cur+='"';i++;}else q=false;}else cur+=ch;}
    else{if(ch==='"')q=true;else if(ch===sep){out.push(cur);cur='';}else cur+=ch;}}
  out.push(cur);return out;
}
function importCSV(file){
  const r=new FileReader();
  r.onload=e=>{
    try{
      const txt=(''+(e.target.result||'')).replace(/^\uFEFF/,'');
      const lines=txt.split(/\r?\n/).filter(l=>l.trim());
      if(!lines.length)throw 0;
      const sep=lines[0].indexOf(';')>=0?';':',';
      const start=/libel|date|type/i.test(lines[0])?1:0;
      const items=[];
      for(let i=start;i<lines.length;i++){
        const p=splitCsv(lines[i],sep);
        const lib=(p[0]||'').trim();let ty=(p[1]||'autre').trim().toLowerCase();const dv=(p[2]||'').trim();
        if(!lib||!dv)continue;
        const dt=new Date(dv.replace(' ','T'));
        if(isNaN(dt.getTime()))continue;
        if(!TYPE_ICON[ty])ty='autre';
        items.push({libelle:lib,type:ty,date_ref:dt.toISOString()});
      }
      if(!items.length)throw 0;
      sb.from('jv_dates').insert(items).then(res=>{
        if(res.error){msg('rgpd-msg','err',res.error.message);return;}
        msg('rgpd-msg','ok',t('importedMsg').replace('{n}',items.length));
        loadMyDates();
      });
    }catch(err){msg('rgpd-msg','err',t('csvErr'));}
  };
  r.readAsText(file);
}
$('rgpd-export').addEventListener('click',exportCSV);
$('rgpd-import').addEventListener('click',()=>{if(sb)$('rgpd-file').click();});
$('rgpd-file').addEventListener('change',e=>{if(e.target.files[0])importCSV(e.target.files[0]);e.target.value='';});
$('rgpd-delete').addEventListener('click',()=>{if(!sb)return;if(!confirm(t('cDelAcc')))return;sb.rpc('jv_delete_account').then(r=>{if(r.error){alert(r.error.message);return;}alert(t('accDeleted'));sb.auth.signOut();});});

/* lang selector */
const sel=$('lang-sel');
Object.keys(I18N).forEach(code=>{const o=document.createElement('option');o.value=code;o.textContent=I18N[code].lang;sel.appendChild(o);});
sel.addEventListener('change',()=>{L=sel.value;lset('jv_lang',L);applyLang();});

/* init */
$('logo-slot').innerHTML=LOGO;
const saved=lget('jv_lang');let nav=(navigator.language||'fr').slice(0,2).toLowerCase();if(nav==='nb'||nav==='nn')nav='no';if(nav==='iw')nav='he';
L=(saved&&I18N[saved])?saved:(I18N[nav]?nav:'fr');
sel.value=L;
applyLang();

}catch(err){
  document.body.innerHTML='<div style="color:#2d2820;font-family:monospace;padding:30px;max-width:700px;margin:auto"><h2 style="color:#d4582f">Erreur</h2><p style="margin-top:12px;line-height:1.6">'+(err&&err.message?err.message:err)+'</p></div>';
}
})();

<style>
  :root{--serif:'Playfair Display',Georgia,serif;--mono:'DM Mono',ui-monospace,Menlo,monospace;
    --bg:#f5efe3;--card:#fffdf8;--line:#e7ddca;--ink:#2d2820;--muted:#938974;
    --gold:#b8893a;--accent:#d4582f;--soft:#fbf6ec;
    --grad:linear-gradient(135deg,#FBB040,#F2674A,#F0506E);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);line-height:1.5;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);}
  html[dir=rtl] body{text-align:right;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 18px 70px;}
  a{color:var(--accent);}

  header{display:flex;align-items:center;gap:13px;padding:8px 0 4px;flex-wrap:wrap;}
  .logo{width:46px;height:46px;border-radius:13px;box-shadow:0 6px 18px rgba(242,103,74,.22);display:block;flex:0 0 46px;}
  .brandtxt{flex:1;}
  .brandtxt h1{font-family:var(--serif);font-size:23px;font-weight:700;color:var(--ink);line-height:1;}
  .brandtxt h1 em{font-style:italic;color:var(--accent);}
  .langsel{background:var(--card);border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--ink);color-scheme:light;outline:none;cursor:pointer;}
  .nav{font-size:11px;color:var(--muted);letter-spacing:.04em;cursor:pointer;}
  .nav:hover{color:var(--accent);}

  .hero{margin:26px 0 8px;}
  .hero h2{font-family:var(--serif);font-size:clamp(26px,6vw,40px);font-weight:700;color:var(--ink);line-height:1.15;margin-bottom:18px;}
  .hero h2 em{font-style:italic;color:var(--accent);}
  .lede{font-size:14px;color:#5e564a;line-height:1.75;margin-bottom:14px;}
  .lede b{color:var(--ink);font-weight:500;}
  .copyline{font-size:11px;color:#9a8f78;letter-spacing:.03em;margin-top:16px;border-inline-start:2px solid var(--line);padding-inline-start:12px;}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px;margin:18px 0;position:relative;overflow:hidden;box-shadow:0 2px 16px rgba(80,55,20,.05);}
  .card.accent::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--grad);}
  .label{font-size:10px;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;}

  label.fld{display:block;font-size:10px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;margin:0 0 8px;}
  input.in,select.in{width:100%;background:var(--soft);border:1px solid var(--line);border-radius:9px;padding:13px 15px;
    font-family:var(--mono);font-size:16px;color:var(--ink);outline:none;transition:border-color .2s;color-scheme:light;-webkit-appearance:none;appearance:none;}
  input.in:focus,select.in:focus{border-color:var(--accent);}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;border:none;border-radius:11px;
    padding:13px 16px;font-family:var(--mono);font-size:13px;letter-spacing:.04em;transition:transform .12s,filter .2s;width:100%;}
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--grad);color:#fff;font-weight:500;}
  .btn-ghost{background:var(--soft);border:1px solid var(--line);color:#6a6253;}
  .btn-danger{background:#fbeeea;border:1px solid #eccabd;color:#b5482c;}
  .btn-row{display:flex;gap:10px;}

  .results{display:none;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .stat{background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:14px 15px;}
  .stat-l{font-size:9px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin-bottom:6px;}
  .stat-v{font-family:var(--serif);font-size:27px;font-weight:700;color:var(--gold);line-height:1;letter-spacing:-1px;}
  .stat.lead{grid-column:1/-1;}.stat.lead .stat-v{font-size:42px;color:var(--accent);}
  .age-line{font-family:var(--serif);font-size:15px;color:#5e564a;margin:4px 0 14px;}.age-line b{color:var(--accent);}

  .next{display:flex;gap:14px;align-items:center;background:linear-gradient(135deg,#fdf2e6,#fce9dd);border:1px solid #f1d8c4;border-radius:12px;padding:16px;margin-top:12px;}
  .next .big{font-family:var(--serif);font-size:30px;color:var(--accent);line-height:1;}
  .next .lbl{font-size:11px;color:#9a6a45;letter-spacing:.04em;text-transform:uppercase;}
  .next .sub{font-size:11px;color:#7a6e5c;margin-top:4px;}
  .next2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
  .next2 .cell{background:var(--soft);border:1px solid var(--line);border-radius:10px;padding:12px;}
  .next2 .cell .t{font-family:var(--serif);font-size:17px;color:var(--ink);}
  .next2 .cell .s{font-size:10px;color:var(--muted);margin-top:4px;}

  .anec{background:linear-gradient(135deg,#fbf4e6,#f9efdf);border:1px solid #efe0c6;border-radius:12px;padding:16px;margin-top:12px;}
  .anec .label{margin-bottom:8px;}
  .anec-txt{font-family:var(--serif);font-style:italic;font-size:14px;line-height:1.6;color:#5a5142;}

  .item{display:flex;align-items:center;gap:13px;background:var(--soft);border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;cursor:pointer;transition:border-color .2s;}
  .item:hover{border-color:#e0b48f;}
  .ava{width:40px;height:40px;border-radius:50%;flex:0 0 40px;display:flex;align-items:center;justify-content:center;font-size:19px;background:#fff;border:1px solid var(--line);}
  .it-name{font-family:var(--serif);font-size:17px;color:var(--ink);}
  .it-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  .it-days{margin-inline-start:auto;text-align:end;}
  .it-days b{font-family:var(--serif);font-size:20px;color:var(--gold);}
  .it-days span{display:block;font-size:8px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;}
  .del-x{margin-inline-start:4px;color:#bcae93;padding:4px 6px;}.del-x:hover{color:var(--accent);}

  .tabs{display:flex;gap:8px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;padding:10px;border-radius:9px;font-size:12px;letter-spacing:.05em;cursor:pointer;background:var(--soft);border:1px solid var(--line);color:var(--muted);}
  .tab.active{background:#fdeede;border-color:#eccbb3;color:var(--accent);}
  .msg{font-size:12px;line-height:1.6;margin-top:12px;padding:11px 13px;border-radius:9px;display:none;}
  .msg.show{display:block;}
  .msg.ok{background:#eef7ee;border:1px solid #cfe6cf;color:#3f7a45;}
  .msg.err{background:#fbeeea;border:1px solid #eccabd;color:#b5482c;}
  .msg.info{background:#f8f2e6;border:1px solid #ecdcbf;color:#7a6a48;}

  .who{font-size:11px;color:var(--muted);}.who b{color:var(--accent);}
  .legal{font-size:11px;color:#6e6556;line-height:1.7;}
  .legal h4{font-family:var(--serif);font-size:14px;color:var(--ink);margin:14px 0 6px;font-style:italic;}
  .foot{font-size:10px;color:#a99e86;letter-spacing:.05em;text-align:center;margin-top:30px;line-height:1.8;}
  .hidden{display:none!important;}
  .pill{display:inline-block;font-size:9px;letter-spacing:.06em;color:#fff;background:var(--grad);padding:2px 8px;border-radius:20px;text-transform:uppercase;vertical-align:middle;margin-inline-start:6px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <span id="logo-slot"></span>
    <div class="brandtxt"><h1><em>Jouri</em>versaire</h1></div>
    <select class="langsel" id="lang-sel" aria-label="Langue"></select>
    <span class="nav" id="nav-account">Mon compte ›</span>
  </header>

  <section id="view-home">
    <div style="margin:2px 0 0"><span class="nav" id="list-back" style="display:none"></span></div>
    <div class="hero">
      <h2 id="hero-title"></h2>
      <p class="lede" id="lede1"></p>
      <p class="lede" id="lede2"></p>
      <p class="copyline" id="copyline"></p>
    </div>

    <div class="card accent">
      <div class="label" id="lbl-calc"></div>
      <div class="row2">
        <div><label class="fld" id="lbl-date" for="c-date"></label><input class="in" id="c-date" type="date" /></div>
        <div><label class="fld" id="lbl-time" for="c-time"></label><input class="in" id="c-time" type="time" /></div>
      </div>
      <div class="results" id="results">
        <div class="age-line" id="r-age"></div>
        <div class="next" id="r-next"></div>
        <div class="next2" id="r-next2"></div>
        <div class="grid" id="r-grid"></div>
        <div class="anec">
          <div class="label"><span id="lbl-anec"></span> <span class="nav" id="anec-refresh" style="font-size:10px">↻</span></div>
          <div class="anec-txt" id="anec-txt">…</div>
        </div>
      </div>
    </div>

    <div class="card" id="cta-card">
      <div class="label" id="lbl-keep"></div>
      <p class="lede" id="txt-keep" style="margin-bottom:14px;font-size:13px"></p>
      <button class="btn btn-primary" id="cta-account"></button>
    </div>
  </section>

  <section id="view-account" class="hidden">
    <span class="nav" id="back-home"></span>
    <div id="auth-block" class="card accent" style="margin-top:14px">
      <div class="tabs">
        <div class="tab active" id="tab-login"></div>
        <div class="tab" id="tab-signup"></div>
      </div>
      <label class="fld" id="lbl-email" for="a-email"></label>
      <input class="in" id="a-email" type="email" autocomplete="email" style="margin-bottom:14px" placeholder="you@mail.com" />
      <label class="fld" id="lbl-pass" for="a-pass"></label>
      <input class="in" id="a-pass" type="password" autocomplete="current-password" style="margin-bottom:16px" placeholder="••••••••" />
      <button class="btn btn-primary" id="a-submit"></button>
      <div style="text-align:center;margin-top:12px"><span class="nav" id="a-forgot" style="font-size:11px"></span></div>
      <div class="msg" id="a-msg"></div>
      <div class="legal" id="consent" style="margin-top:14px;display:none"></div>
    </div>

    <div id="app-block" class="hidden">
      <div class="card" style="margin-top:14px">
        <div class="who"><span id="who-label"></span> <b id="who-email"></b> <span class="nav" id="a-logout" style="float:right"></span></div>
      </div>
      <div class="card accent">
        <div class="label" id="lbl-add"></div>
        <label class="fld" id="lbl-dlabel" for="d-name"></label>
        <input class="in" id="d-name" style="margin-bottom:12px" />
        <label class="fld" id="lbl-dtype" for="d-type"></label>
        <select class="in" id="d-type" style="margin-bottom:12px">
          <option value="naissance" id="opt-naissance"></option><option value="mariage" id="opt-mariage"></option>
          <option value="rencontre" id="opt-rencontre"></option><option value="autre" id="opt-autre"></option>
        </select>
        <div class="row2" style="margin-bottom:14px">
          <div><label class="fld" id="lbl-ddate" for="d-date"></label><input class="in" id="d-date" type="date" /></div>
          <div><label class="fld" id="lbl-dtime" for="d-time"></label><input class="in" id="d-time" type="time" /></div>
        </div>
        <button class="btn btn-primary" id="d-add"></button>
        <div class="msg" id="d-msg"></div>
      </div>
      <div class="card">
        <div class="label" id="lbl-mydates"></div>
        <div id="d-list"></div>
        <div id="d-empty" class="legal" style="text-align:center;padding:16px 0;font-style:italic"></div>
      </div>
      <div class="card">
        <div class="label"><span id="lbl-mydata"></span> <span class="pill">RGPD</span></div>
        <p class="legal" id="rgpd-desc" style="margin-bottom:14px"></p>
        <div class="btn-row">
          <button class="btn btn-ghost" id="rgpd-export"></button>
          <button class="btn btn-danger" id="rgpd-delete"></button>
        </div>
      </div>
    </div>
  </section>

  <section id="view-legal" class="hidden">
    <span class="nav" id="back-home2"></span>
    <div class="card" style="margin-top:14px"><div class="legal" id="legal-body"></div></div>
  </section>

  <div class="foot">
    <span id="foot-tag"></span><br>© 2026 Georges Viana · <span class="nav" id="foot-legal"></span>
  </div>
</div>

/* date math */
function addMonths(d,n){const x=new Date(d.getTime());const day=x.getDate();x.setMonth(x.getMonth()+n);if(x.getDate()<day)x.setDate(0);return x;}
function exactAge(b,now){let y=now.getFullYear()-b.getFullYear(),m=now.getMonth()-b.getMonth(),d=now.getDate()-b.getDate();if(d<0){m--;d+=new Date(now.getFullYear(),now.getMonth(),0).getDate();}if(m<0){y--;m+=12;}return {y:y,m:m,d:d};}
function trunc0(x){return x>=0?Math.floor(x):Math.ceil(x);}
function counts(b,now){var diff=now-b,fut=diff<0,a=fut?exactAge(now,b):exactAge(b,now),sgn=fut?-1:1;return {jours:trunc0(diff/MS_DAY),semaines:trunc0(diff/MS_DAY/7),mois:sgn*(a.y*12+a.m),annees:sgn*a.y,heures:trunc0(diff/3600000),minutes:trunc0(diff/60000),secondes:trunc0(diff/1000),age:{y:sgn*a.y,m:sgn*a.m,d:sgn*a.d}};}
function nextMult(c,s){var r=(Math.floor(c/s)+1)*s;return r>0?r:s;}

  $('opt-naissance').textContent=t('tNaissance');$('opt-mariage').textContent=t('tMariage');$('opt-rencontre').textContent=t('tRencontre');$('opt-autre').textContent=t('tAutre');
  $('d-add').textContent=t('save');$('lbl-mydates').textContent=t('myDates');$('d-empty').textContent=t('noDates');
  $('lbl-mydata').textContent=t('myData');$('rgpd-desc').textContent=t('rgpdDesc');$('rgpd-export').textContent=t('exportData');$('rgpd-delete').textContent=t('deleteAcc');
  $('legal-body').innerHTML=t('legal');$('foot-tag').textContent=t('footTag');$('foot-legal').textContent=t('footLegal');
  setMode(mode);
  bindConsent();
  if(calcDate)renderCalc();
  renderMyDates();
}
function bindConsent(){
  $('consent').innerHTML=t('consent').replace('{link}','<a href="#" id="open-legal">'+t('consentLink')+'</a>');
  const ol=$('open-legal');if(ol)ol.addEventListener('click',e=>{e.preventDefault();show('legal');});
}

/* ===== calculator ===== */
let calcDate=null,calcTick=null;
function readCalc(){const dv=$('c-date').value;if(!dv)return null;const tv=$('c-time').value||'00:00';const dt=new Date(dv+'T'+tv);if(isNaN(dt.getTime()))return null;return dt;}
function renderCalc(){
  const dt=readCalc();const res=$('results');if(!dt){res.style.display='none';calcDate=null;return;}
  calcDate=dt;res.style.display='block';const now=new Date(),c=counts(dt,now);
  $('r-age').innerHTML=t('lifeTpl').replace('{y}',c.age.y).replace('{m}',c.age.m).replace('{d}',c.age.d);
  const n1=nextMult(c.jours,1000),d1=new Date(dt.getTime()+n1*MS_DAY),r1=Math.ceil((d1-now)/MS_DAY);
  $('r-next').innerHTML='<div><div class="lbl">'+t('nextLabel')+'</div><div class="big">'+fmt(n1)+' '+t('daysWord')+'</div>'
    +'<div class="sub">'+t('nextSub').replace('{date}',fmtDate(d1,{weekday:'long',day:'numeric',month:'long',year:'numeric'})).replace('{n}',fmt(r1))+'</div></div>';
  const n5=nextMult(c.jours,5000),d5=new Date(dt.getTime()+n5*MS_DAY),n10=nextMult(c.jours,10000),d10=new Date(dt.getTime()+n10*MS_DAY);
  $('r-next2').innerHTML='<div class="cell"><div class="t">'+fmt(n5)+' '+t('daysWord')+'</div><div class="s">'+fmtDate(d5,{day:'numeric',month:'short',year:'numeric'})+'</div></div>'
    +'<div class="cell"><div class="t">'+fmt(n10)+' '+t('daysWord')+'</div><div class="s">'+fmtDate(d10,{day:'numeric',month:'short',year:'numeric'})+'</div></div>';
  const cells=[['jours','uJours',1],['semaines','uSemaines',0],['mois','uMois',0],['annees','uAnnees',0],['heures','uHeures',0],['minutes','uMinutes',0],['secondes','uSecondes',0]];
  $('r-grid').innerHTML=cells.map(x=>'<div class="stat'+(x[2]?' lead':'')+'"><div class="stat-l">'+t(x[1])+'</div><div class="stat-v" id="cv-'+x[0]+'">'+fmt(c[x[0]])+'</div></div>').join('');
  if(calcTick)clearInterval(calcTick);
  calcTick=setInterval(()=>{const cc=counts(calcDate,new Date());['secondes','minutes','heures'].forEach(u=>{const e=$('cv-'+u);if(e)e.textContent=fmt(cc[u]);});},1000);
  loadAnecdote(dt);
}
function loadAnecdote(dt){
  const el=$('anec-txt');el.textContent=t('anecLoad');
  const mm=('0'+(dt.getMonth()+1)).slice(-2),dd=('0'+dt.getDate()).slice(-2);
  fetch('https://'+L+'.wikipedia.org/api/rest_v1/feed/onthisday/events/'+mm+'/'+dd)
    .then(r=>r.json()).then(data=>{const ev=(data&&data.events)||[];if(!ev.length){el.textContent=t('anecNone');return;}
      const p=ev[Math.floor(Math.random()*Math.min(ev.length,15))];el.textContent=t('anecTpl').replace('{year}',p.year).replace('{text}',p.text);})
    .catch(()=>{el.textContent=t('anecErr');});
}
$('c-date').addEventListener('change',renderCalc);$('c-date').addEventListener('input',renderCalc);$('c-time').addEventListener('change',renderCalc);
$('anec-refresh').addEventListener('click',()=>{if(calcDate)loadAnecdote(calcDate);});

/* nav */
function showView(v){['home','account','legal'].forEach(x=>$('view-'+x).classList.add('hidden'));$('view-'+v).classList.remove('hidden');window.scrollTo(0,0);}
function show(v){showView(v);try{history.pushState({v:v},'');}catch(e){}}
window.addEventListener('popstate',function(e){showView((e.state&&e.state.v)||'home');});
try{history.replaceState({v:'home'},'');}catch(e){}
$('nav-account').addEventListener('click',()=>show('account'));
$('cta-account').addEventListener('click',()=>{show('account');setMode('signup');});
$('back-home').addEventListener('click',()=>show('home'));
$('back-home2').addEventListener('click',()=>show('account'));
$('foot-legal').addEventListener('click',()=>show('legal'));
$('list-back').addEventListener('click',()=>show('account'));

/* auth UI */
let mode='login';
function setMode(m){mode=m;const on=m==='signup';
  $('tab-login').classList.toggle('active',!on);$('tab-signup').classList.toggle('active',on);
  $('a-submit').textContent=on?t('btnSignup'):t('btnLogin');
  $('consent').style.display=on?'block':'none';$('a-forgot').style.display=on?'none':'inline';hideMsg('a-msg');}
$('tab-login').addEventListener('click',()=>setMode('login'));
$('tab-signup').addEventListener('click',()=>setMode('signup'));
function msg(id,k,h){const e=$(id);e.className='msg show '+k;e.innerHTML=h;}
function hideMsg(id){$(id).className='msg';}
function needSb(){if(!sb){msg('a-msg','info',t('mPreview'));return false;}return true;}

$('a-submit').addEventListener('click',()=>{
  const email=($('a-email').value||'').trim(),pass=$('a-pass').value||'';
  if(!email||!pass){msg('a-msg','err',t('mFields'));return;}
  if(!needSb())return;$('a-submit').disabled=true;
  if(mode==='signup'){
    sb.auth.signUp({email:email,password:pass,options:{emailRedirectTo:location.origin+location.pathname}}).then(r=>{$('a-submit').disabled=false;if(r.error){msg('a-msg','err',r.error.message);return;}msg('a-msg','ok',t('mCreated'));});
  }else{
    sb.auth.signInWithPassword({email:email,password:pass}).then(r=>{$('a-submit').disabled=false;if(r.error){msg('a-msg','err',r.error.message==='Invalid login credentials'?t('mInvalid'):r.error.message);return;}});
  }
});
$('a-forgot').addEventListener('click',()=>{
  const email=($('a-email').value||'').trim();if(!email){msg('a-msg','info',t('mEmailFirst'));return;}if(!needSb())return;
  sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname}).then(r=>{if(r.error){msg('a-msg','err',r.error.message);return;}msg('a-msg','ok',t('mReset'));});
});
$('a-logout').addEventListener('click',()=>{if(sb)sb.auth.signOut();});

let user=null,myDates=[];
function setAuth(u){user=u;$('auth-block').classList.toggle('hidden',!!u);$('app-block').classList.toggle('hidden',!u);$('cta-card').style.display=u?'none':'block';var lb=$('list-back');if(lb){lb.textContent='‹ '+t('myDates');lb.style.display=u?'inline':'none';}if(u){$('who-email').textContent=u.email;loadMyDates();}}
if(sb){
  sb.auth.getSession().then(r=>setAuth(r.data.session?r.data.session.user:null));
  sb.auth.onAuthStateChange((ev,s)=>{if(ev==='PASSWORD_RECOVERY'){const np=prompt(t('newPass'));if(np)sb.auth.updateUser({password:np}).then(r=>alert(r.error?r.error.message:t('passUpd')));}setAuth(s?s.user:null);});
}
function loadMyDates(){if(!sb)return;sb.from('jv_dates').select('*').order('date_ref',{ascending:true}).then(r=>{if(r.error){msg('d-msg','err',r.error.message);return;}myDates=r.data||[];renderMyDates();});}
function renderMyDates(){
  const list=$('d-list');if(!list)return;list.innerHTML='';$('d-empty').style.display=myDates.length?'none':'block';const now=new Date();
  myDates.forEach(p=>{const b=new Date(p.date_ref),c=counts(b,now);const el=document.createElement('div');el.className='item';
    el.innerHTML='<div class="ava">'+(TYPE_ICON[p.type]||'✦')+'</div><div style="min-width:0"><div class="it-name">'+esc(p.libelle)+'</div><div class="it-sub">'+fmtDate(b,{day:'numeric',month:'short',year:'numeric'})+'</div></div>'
      +'<div class="it-days"><b>'+fmt(c.jours)+'</b><span>'+t('daysWord')+'</span></div><div class="del-x" data-del="'+p.id+'">✕</div>';
    el.addEventListener('click',e=>{if(e.target.getAttribute('data-del'))return;$('c-date').value=(''+p.date_ref).slice(0,10);const tm=(''+p.date_ref).slice(11,16);$('c-time').value=(tm&&tm!=='00:00')?tm:'';show('home');renderCalc();});
    el.querySelector('[data-del]').addEventListener('click',e=>{e.stopPropagation();delDate(p.id,p.libelle);});
    list.appendChild(el);});
}
$('d-add').addEventListener('click',()=>{if(!sb)return;const libelle=($('d-name').value||'').trim(),type=$('d-type').value,dv=$('d-date').value,tv=$('d-time').value||'00:00';if(!libelle||!dv){msg('d-msg','err',t('mFieldsReq'));return;}const iso=new Date(dv+'T'+tv).toISOString();sb.from('jv_dates').insert({libelle:libelle,type:type,date_ref:iso}).select().then(r=>{if(r.error){msg('d-msg','err',r.error.message);return;}$('d-name').value='';$('d-date').value='';$('d-time').value='';hideMsg('d-msg');loadMyDates();});});
function delDate(id,lib){if(!confirm(t('cDelDate').replace('{l}',lib)))return;sb.from('jv_dates').delete().eq('id',id).then(r=>{if(r.error){alert(r.error.message);return;}loadMyDates();});}
$('rgpd-export').addEventListener('click',()=>{const data={compte:user?user.email:null,exporte:new Date().toISOString(),dates:myDates};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='jouriversaire.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),500);});
$('rgpd-delete').addEventListener('click',()=>{if(!sb)return;if(!confirm(t('cDelAcc')))return;sb.rpc('jv_delete_account').then(r=>{if(r.error){alert(r.error.message);return;}alert(t('accDeleted'));sb.auth.signOut();});});

/* lang selector */
const sel=$('lang-sel');
Object.keys(I18N).forEach(code=>{const o=document.createElement('option');o.value=code;o.textContent=I18N[code].lang;sel.appendChild(o);});
sel.addEventListener('change',()=>{L=sel.value;lset('jv_lang',L);applyLang();});

/* init */
$('logo-slot').innerHTML=LOGO;
const saved=lget('jv_lang'),nav=(navigator.language||'fr').slice(0,2).toLowerCase();
L=(saved&&I18N[saved])?saved:(I18N[nav]?nav:'fr');
sel.value=L;
applyLang();

}catch(err){
  document.body.innerHTML='<div style="color:#2d2820;font-family:monospace;padding:30px;max-width:700px;margin:auto"><h2 style="color:#d4582f">Erreur</h2><p style="margin-top:12px;line-height:1.6">'+(err&&err.message?err.message:err)+'</p></div>';
}
})();
